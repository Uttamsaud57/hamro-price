{% extends 'base.html' %}
{% block title %}Register – Hamro Price{% endblock %}

{% block content %}
<div class="row justify-content-center mt-3">
  <div class="col-md-5 col-lg-4">
    <div class="auth-card card">
      <div class="text-center mb-4">
        <div class="auth-logo">
          <i class="bi bi-tags-fill me-1" style="color:#f97316;"></i>
          Hamro<span>Price</span>
        </div>
        <p class="text-muted mt-1 mb-0" style="font-size:0.875rem;">Create your free account</p>
      </div>

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input type="text" name="name" class="form-control border-start-0 ps-0"
                   placeholder="Your name" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-envelope text-muted"></i>
            </span>
            <input type="email" name="email" class="form-control border-start-0 ps-0"
                   placeholder="you@example.com" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input type="password" name="password" class="form-control border-start-0 ps-0"
                   placeholder="Min. 6 characters" minlength="6" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-hp w-100 py-2">
          <i class="bi bi-person-plus me-1"></i> Create Account
        </button>
      </form>

      <hr class="my-3"/>
      <p class="text-center text-muted mb-0" style="font-size:0.875rem;">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" style="color:#f97316; font-weight:600;">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
