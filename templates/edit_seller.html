{% extends 'base.html' %}
{% block title %}Edit Seller – Hamro Price{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4"><i class="bi bi-pencil-square"></i> Edit Seller</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Seller Name</label>
            <input type="text" name="name" class="form-control"
                   value="{{ seller.name }}" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Rating (0–5)</label>
            <input type="number" name="rating" class="form-control"
                   step="0.1" min="0" max="5" value="{{ seller.rating }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Trust Score (0–10)</label>
            <input type="number" name="trust_score" class="form-control"
                   step="0.1" min="0" max="10" value="{{ seller.trust_score }}"/>
          </div>
          <div class="mb-3">
            <div class="form-check">
              <input type="checkbox" name="is_verified" class="form-check-input"
                     id="isVerified" {% if seller.is_verified %}checked{% endif %}/>
              <label class="form-check-label" for="isVerified">
                <i class="bi bi-patch-check-fill me-1" style="color:#16a34a;"></i>
                Verified Marketplace
              </label>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Save Changes</button>
            <a href="{{ url_for('admin.dashboard') }}"
               class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
