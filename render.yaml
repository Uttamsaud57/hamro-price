services:
  - type: web
    name: hamro-price
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:app" --config gunicorn.conf.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
